{{- /*
  Self-hosted or Bilibili video (see docs/05 — no YouTube).
  Self-hosted: {{< video webm="/media/x.webm" mp4="/media/x.mp4" poster="/media/x.jpg" >}}
  Bilibili:    {{< video bilibili="BVxxxxxxxx" >}}
*/ -}}
{{- with .Get "bilibili" -}}
  <div style="position:relative;aspect-ratio:16/9;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--c-border);margin:var(--space-6) 0;">
    <iframe
      src="https://player.bilibili.com/player.html?bvid={{ . }}&autoplay=0"
      loading="lazy" allowfullscreen scrolling="no" frameborder="0"
      style="position:absolute;inset:0;width:100%;height:100%;"
      title="Bilibili video"></iframe>
  </div>
{{- else -}}
  <video controls preload="none" {{ with .Get "poster" }}poster="{{ . }}"{{ end }}
    playsinline
    style="width:100%;border-radius:var(--radius-lg);border:1px solid var(--c-border);margin:var(--space-6) 0;">
    {{ with .Get "webm" }}<source src="{{ . }}" type="video/webm" />{{ end }}
    {{ with .Get "mp4" }}<source src="{{ . }}" type="video/mp4" />{{ end }}
  </video>
{{- end -}}
