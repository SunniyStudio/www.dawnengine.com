{{ define "main" }}
<header class="page-hero">
  <div class="container container--wide">
    <p class="eyebrow">{{ .Data.Singular }}</p>
    <h1>{{ .Title }}</h1>
  </div>
</header>
<div class="container container--wide section--tight">
  <div class="grid grid--3">
    {{ range .Pages }}
      <a class="fcard" href="{{ .RelPermalink }}">
        <h3 class="fcard__title">{{ .Title }}</h3>
        <p class="fcard__desc">{{ len .Pages }}</p>
        <span class="fcard__arrow">{{ partial "icon.html" (dict "name" "arrow-right" "class" "icon--sm") }}</span>
      </a>
    {{ end }}
  </div>
</div>
{{ end }}
